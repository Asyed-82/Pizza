<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cheese Pizza - Order Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: #ff6b35;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .content {
            padding: 24px;
        }

        .order-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        input, select, textarea {
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ff6b35;
        }

        .price-box {
            background: #fff5f0;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid #ff6b35;
        }

        .price-box h3 {
            color: #ff6b35;
            font-size: 2em;
        }

        button {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #ccc;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 0.9em;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍕 Cheese Pizza</h1>
            <p>Fresh & Delicious • Made to Order</p>
        </div>
        <div class="content">
            <form id="orderForm" class="order-form">
                <div class="form-group">
                    <label>👤 Your Name</label>
                    <input type="text" id="customerName" required placeholder="Enter your name">
                </div>
                
                <div class="form-group">
                    <label>📞 Phone Number</label>
                    <input type="tel" id="phone" required placeholder="Enter phone number">
                </div>
                
                <div class="form-group">
                    <label>🍕 Quantity</label>
                    <select id="quantity">
                        <option value="1">1 Pizza - $12.99</option>
                        <option value="2">2 Pizzas - $25.98</option>
                        <option value="3">3 Pizzas - $38.97</option>
                        <option value="4">4 Pizzas - $51.96</option>
                        <option value="5">5 Pizzas - $64.95</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>📍 Delivery Address</label>
                    <textarea id="address" rows="3" required placeholder="Enter your full address"></textarea>
                </div>
                
                <div class="form-group">
                    <label>📝 Special Instructions</label>
                    <textarea id="notes" rows="2" placeholder="Extra cheese? No onions? Let us know..."></textarea>
                </div>
                
                <div class="price-box">
                    <h3 id="totalPrice">$12.99</h3>
                    <p>Classic Cheese Pizza • 12"</p>
                </div>
                
                <button type="submit">Place Order 🍕</button>
            </form>
            
            <div id="message"></div>
        </div>
    </div>

    <script>
        const PIZZA_PRICE = 12.99;
        
        document.getElementById('quantity').addEventListener('change', function() {
            const total = (PIZZA_PRICE * parseInt(this.value)).toFixed(2);
            document.getElementById('totalPrice').textContent = `$${total}`;
        });
        
        function generateOrderId() {
            return 'ORD-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        }
        
        document.getElementById('orderForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const messageDiv = document.getElementById('message');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            const orderData = {
                orderId: generateOrderId(),
                timestamp: new Date().toISOString(),
                customerName: document.getElementById('customerName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                quantity: parseInt(document.getElementById('quantity').value),
                address: document.getElementById('address').value.trim(),
                notes: document.getElementById('notes').value.trim(),
                total: (PIZZA_PRICE * parseInt(document.getElementById('quantity').value)).toFixed(2),
                status: 'pending'
            };
            
            if (!orderData.customerName || !orderData.phone || !orderData.address) {
                messageDiv.innerHTML = '⚠️ Please fill all fields';
                messageDiv.className = 'message error';
                setTimeout(() => {
                    messageDiv.className = 'message';
                }, 3000);
                return;
            }
            
            // Save to localStorage
            let existingOrders = JSON.parse(localStorage.getItem('kitchen_orders') || '[]');
            existingOrders.unshift(orderData);
            localStorage.setItem('kitchen_orders', JSON.stringify(existingOrders));
            
            // Force a storage event for the kitchen page
            window.dispatchEvent(new StorageEvent('storage', {
                key: 'kitchen_orders',
                newValue: JSON.stringify(existingOrders)
            }));
            
            // Show success
            messageDiv.innerHTML = `✅ Order placed! Order #${orderData.orderId}<br>Kitchen is preparing your pizza.`;
            messageDiv.className = 'message success';
            
            // Clear form
            document.getElementById('customerName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('address').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('quantity').value = '1';
            document.getElementById('totalPrice').textContent = '$12.99';
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        });
    </script>
</body>
</html>
